function log(msg, cls='ok') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(msg) {
  document.getElementById('progress').textContent = msg;
}

window.startMigration = async function() {
  document.getElementById('btn').disabled = true;
  log('🚀 Migration başlıyor...', 'inf');

  try {
    // 1. Gündem
    log(`📋 Gündem: ${DATA.gundem.length} kayıt yükleniyor...`, 'inf');
    let batch = writeBatch(db);
    let count = 0;
    for (const rec of DATA.gundem) {
      const ref = doc(db, 'gundem', rec.id);
      batch.set(ref, rec);
      count++;
      if (count % 400 === 0) {
        await batch.commit();
        batch = writeBatch(db);
        log(`  → ${count} kayıt yazıldı...`);
      }
    }
    await batch.commit();
    log(`✅ Gündem tamamlandı: ${DATA.gundem.length} kayıt`);

    // 2. KasaGider
    log(`💰 KasaGider: ${DATA.kasaGider.length} kayıt yükleniyor...`, 'inf');
    const batch2 = writeBatch(db);
    for (const rec of DATA.kasaGider) {
      batch2.set(doc(db, 'kasaGider', rec.id), rec);
    }
    await batch2.commit();
    log(`✅ KasaGider tamamlandı: ${DATA.kasaGider.length} kayıt`);

    // 3. Meta
    log(`⚙️ Meta veriler yükleniyor...`, 'inf');
    await setDoc(doc(db, 'meta', 'config'), {
      noterler: DATA.noterler,
      cariler: DATA.cariler,
      tercumanlar: DATA.tercumanlar
    });
    log(`✅ Meta tamamlandı`);

    log('', '');
    log('🎉 MİGRATION TAMAMLANDI! Tüm veriler Firestore\'a yüklendi.', 'ok');
    setProgress('✅ Tamamlandı!');

  } catch(e) {
    log('❌ HATA: ' + e.message, 'err');
    log('Konsolu kontrol edin (F12)', 'err');
    document.getElementById('btn').disabled = false;
    setProgress('');
  }
};
